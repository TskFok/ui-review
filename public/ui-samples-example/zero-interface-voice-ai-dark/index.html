<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero Interface Voice AI Dark</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell" aria-label="Zero Interface 语音 AI 深色样式">
      <header class="topbar">
        <a class="brand" href="#" aria-label="NOVA Voice 首页">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v18M5 9v6M19 9v6M8.5 6.5v11M15.5 6.5v11" />
          </svg>
          <span>NOVA Voice</span>
        </a>
        <nav aria-label="主导航">
          <a href="#">会话</a>
          <a href="#">技能</a>
          <a href="#">记忆</a>
          <a href="#">部署</a>
        </nav>
        <button class="icon-button" type="button" aria-label="打开空间设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z" />
            <path d="M4 12h2M18 12h2M12 4v2M12 18v2M6.6 6.6 8 8M16 16l1.4 1.4M17.4 6.6 16 8M8 16l-1.4 1.4" />
          </svg>
        </button>
      </header>

      <section class="hero" aria-labelledby="hero-title">
        <div class="voice-stage" aria-label="语音助手正在监听">
          <div class="listening-ring">
            <span></span>
            <span></span>
            <span></span>
            <div class="core">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V7a3 3 0 0 0-3-3Z" />
                <path d="M5 11a7 7 0 0 0 14 0M12 18v3M9 21h6" />
              </svg>
            </div>
          </div>
          <p class="status">正在理解会议上下文</p>
        </div>

        <div class="hero-copy">
          <p class="eyebrow">Zero Interface for AI Platforms</p>
          <h1 id="hero-title">把复杂平台收进一句自然语言。</h1>
          <p class="summary">
            用语音、记忆和意图路由替代多层菜单。界面只在需要确认、纠错和追踪状态时出现。
          </p>
          <form class="prompt-bar" aria-label="语音或文本输入">
            <label for="ask-input">告诉 NOVA 你要完成什么</label>
            <div class="prompt-control">
              <input id="ask-input" type="text" value="总结今天的客户电话，并创建三条跟进任务" />
              <button type="submit" aria-label="发送请求">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m5 12 14-7-4 14-3-6-7-1Z" />
                </svg>
              </button>
            </div>
          </form>
        </div>
      </section>

      <section class="conversation" aria-label="实时会话">
        <article class="transcript active">
          <p class="speaker">用户</p>
          <h2>“帮我准备 15 分钟后的产品评审。”</h2>
          <p>NOVA 已读取会议议程、最近三次变更记录和阻塞事项。</p>
        </article>
        <article class="transcript">
          <p class="speaker">NOVA</p>
          <h2>建议先讨论风险最高的支付重试策略。</h2>
          <p>已生成 6 页简报、2 个决策问题和一个可回滚发布计划。</p>
        </article>
      </section>

      <section class="signals" aria-label="平台状态">
        <article>
          <span class="signal-line"></span>
          <p>意图置信度</p>
          <strong>96%</strong>
        </article>
        <article>
          <span class="signal-line"></span>
          <p>可用工具</p>
          <strong>18</strong>
        </article>
        <article>
          <span class="signal-line"></span>
          <p>上下文窗口</p>
          <strong>128K</strong>
        </article>
        <article>
          <span class="signal-line"></span>
          <p>延迟</p>
          <strong>84ms</strong>
        </article>
      </section>
    </main>
  </body>
</html>
