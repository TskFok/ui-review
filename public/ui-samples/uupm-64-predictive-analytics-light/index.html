<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>预测分析 浅色</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="archetype-dashboard">
    <main class="sample-shell" aria-label="预测分析 浅色样式示例">
      <section class="hero-panel">
        <div class="eyebrow">Available Styles 64 / dashboard</div>
        <h1>预测分析</h1>
        <p>Predictive Analytics 的浅色界面样张，适用于 Forecasting, ML insights。</p>
        <div class="actions">
          <a class="primary-action" href="#preview">查看组件</a>
          <a class="secondary-action" href="#metrics">评估指标</a>
        </div>
      </section>
      <section class="preview-grid" id="preview">
        <article class="feature-card large">
          <div class="card-head">
            <span>风格特征</span>
            <strong>Predictive Analytics</strong>
          </div>
          <div class="visual-stage" aria-hidden="true">
            <span>KPI</span><span>Trend</span><span>Map</span><span>Alert</span><span>Flow</span><span>Ratio</span>
          </div>
        </article>
        <article class="feature-card">
          <span class="metric-label">适配场景</span>
          <strong>Forecasting, ML insights</strong>
          <p>色彩、层级和动效均按当前样式收敛，便于快速比较。</p>
        </article>
        <article class="feature-card" id="metrics">
          <span class="metric-label">体验约束</span>
          <strong>AA 对比度 / 44px 触达 / 200ms 反馈</strong>
          <p>浅色与深色版本分别调校文本、边框和交互状态。</p>
        </article>
      </section>
    </main>
  </body>
</html>
